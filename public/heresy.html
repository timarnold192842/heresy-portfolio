            function submitTrade() {
                const isEditing = editingTradeIdx !== null;
                const entryDate = document.getElementById('tradeEntryDate').value;
                const qty = parseFloat(document.getElementById('tradeQty').value);
                const entryPrice = parseFloat(document.getElementById('tradeEntryPrice').value);
                const category = document.getElementById('tradeCategory').value;
                const profitExit = parseFloat(document.getElementById('tradeProfitExit').value) || null;
                const lossExit = parseFloat(document.getElementById('tradeLossExit').value) || null;
                const entryGoal = parseFloat(document.getElementById('tradeEntryGoal').value) || null;
                const exitDateVal = document.getElementById('tradeExitDate').value || null;
                const exitPriceVal = parseFloat(document.getElementById('tradeExitPrice').value) || null;
                const sellOrder = document.getElementById('tradeSellOrder').value === 'true';
                const account = document.getElementById('tradeAccount').value;

                if (!entryDate || isNaN(qty) || qty <= 0 || isNaN(entryPrice) || entryPrice <= 0) {
                    alert('Please fill in Entry Date, Quantity, and Entry Price.');
                    return;
                }

                if (isEditing) {
                    const input = document.getElementById('tradeTicker').value;
                    const parsed = parseTicker(input);
                    if (!parsed) {
                        alert('Cannot parse ticker. Use "AAPL" for stock or "PLNT 01/15/2027 60 P" for option.');
                        return;
                    }
                    const trade = tradesData[editingTradeIdx];
                    trade.type = parsed.type;
                    trade.ticker = parsed.ticker;
                    if (parsed.type === 'option') {
                        trade.expiration = parsed.expiration;
                        trade.strike = parsed.strike;
                        trade.option_type = parsed.option_type;
                    } else {
                        delete trade.expiration;
                        delete trade.strike;
                        delete trade.option_type;
                    }
                    trade.entry_date = entryDate;
                    trade.quantity = qty;
                    trade.entry_price = entryPrice;
                    trade.category = category;
                    trade.profit_exit = profitExit;
                    trade.loss_exit = lossExit;
                    trade.entry_goal = entryGoal;
                    trade.exit_date = exitDateVal;
                    trade.exit_price = exitPriceVal;
                    trade.sell_order_placed = sellOrder;
                    trade.account = account;
                } else {
                    const input = document.getElementById('tradeTicker').value;
                    const parsed = parseTicker(input);
                    if (!parsed) {
                        alert('Cannot parse ticker. Use "AAPL" for stock or "PLNT 01/15/2027 60 P" for option.');
                        return;
                    }
                    const trade = {
                        type: parsed.type,
                        entry_date: entryDate,
                        ticker: parsed.ticker,
                        quantity: qty,
                        entry_price: entryPrice,
                        exit_date: null,
                        exit_price: null,
                        entry_goal: entryGoal,
                        profit_exit: profitExit,
                        loss_exit: lossExit,
                        sell_order_placed: false,
                        category: category,
                        account: account
                    };
                    if (parsed.type === 'option') {
                        trade.expiration = parsed.expiration;
                        trade.strike = parsed.strike;
                        trade.option_type = parsed.option_type;
                    }
                    tradesData.push(trade);
                }

                editingTradeIdx = null;
                closeTradeModal();
                generateTable();
                Object.keys(dynamicPanelConfigs).forEach(panelId => {
                    const numId = parseInt(panelId.replace('dynPanel_', ''));
                    if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                });
            }

            function deleteTrade(idx) {
                const trade = tradesData[idx];
                if (!trade) return;
                const desc = trade.type === 'option'
                    ? `${trade.ticker} ${trade.strike}${trade.option_type} ${trade.expiration}`
                    : `${trade.ticker} x${trade.quantity}`;
                if (!confirm(`Delete trade: ${desc}?`)) return;
                tradesData.splice(idx, 1);
                generateTable();
                Object.keys(dynamicPanelConfigs).forEach(panelId => {
                    const numId = parseInt(panelId.replace('dynPanel_', ''));
                    if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                });
            }

            let sellingPortionIdx = null;

            function showSellPortionModal(tradeIdx) {
                const trade = tradesData[tradeIdx];
                if (!trade) return;
                if (isTradeClosed(trade)) { alert('Trade is already closed.'); return; }
                sellingPortionIdx = tradeIdx;
                const desc = trade.type === 'option'
                    ? `${trade.ticker} ${trade.strike}${trade.option_type} exp ${trade.expiration}`
                    : trade.ticker;
                document.getElementById('sellPortionInfo').textContent = `${desc} — ${trade.quantity} @ ${formatCurrency(trade.entry_price)}`;
                document.getElementById('sellPortionQty').value = '';
                document.getElementById('sellPortionQty').max = trade.quantity;
                document.getElementById('sellPortionPrice').value = '';
                document.getElementById('sellPortionDate').value = new Date().toISOString().slice(0, 10);
                document.getElementById('sellPortionOverlay').classList.add('show');
                document.getElementById('sellPortionQty').focus();
            }

            function closeSellPortionModal() {
                document.getElementById('sellPortionOverlay').classList.remove('show');
                sellingPortionIdx = null;
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.getElementById('sellPortionOverlay').classList.contains('show')) {
                    closeSellPortionModal();
                }
            });

            function submitSellPortion() {
                if (sellingPortionIdx === null) return;
                const trade = tradesData[sellingPortionIdx];
                if (!trade) return;

                const sellQty = parseFloat(document.getElementById('sellPortionQty').value);
                const sellPrice = parseFloat(document.getElementById('sellPortionPrice').value);
                const sellDate = document.getElementById('sellPortionDate').value;

                if (isNaN(sellQty) || sellQty <= 0) { alert('Enter a valid quantity to sell.'); return; }
                if (sellQty >= trade.quantity) { alert(`Quantity must be less than ${trade.quantity}. To close the full position, use Edit instead.`); return; }
                if (isNaN(sellPrice) || sellPrice < 0) { alert('Enter a valid sell price.'); return; }
                if (!sellDate) { alert('Enter a sell date.'); return; }

                // Create the closed portion (sold shares) with original open details
                const closedPortion = JSON.parse(JSON.stringify(trade));
                closedPortion.quantity = sellQty;
                closedPortion.exit_date = sellDate;
                closedPortion.exit_price = sellPrice;

                // Reduce the original trade's quantity (remains open)
                trade.quantity = trade.quantity - sellQty;

                // Insert the closed portion right after the original trade
                tradesData.splice(sellingPortionIdx + 1, 0, closedPortion);

                closeSellPortionModal();
                generateTable();
                Object.keys(dynamicPanelConfigs).forEach(panelId => {
                    const numId = parseInt(panelId.replace('dynPanel_', ''));
                    if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                });
            }

            // Main table generation function
            // Tickers currently being refreshed; rows for these keys render in a
            // "loading" state until their fetch completes. Lives at script scope so
            // both the row builder and the refresh flow (inside the IIFE) can see it.
            let refreshingKeys = new Set();

            // Compute the marketData key for a trade (ticker for stocks, Polygon
            // option symbol for options).
            function getTradeMarketKey(trade) {
                if (trade.type === 'stock') return trade.ticker;
                const ed = new Date(trade.expiration);
                const yymmdd = ed.toISOString().slice(2, 10).replace(/-/g, '');
                const optionType = trade.option_type.toUpperCase();
                const strikeFormatted = String(Math.round(trade.strike * 1000)).padStart(8, '0');
                return `O:${trade.ticker}${yymmdd}${optionType}${strikeFormatted}`;
            }

            // Build a single <tr> for a trade. Shared by the main table and dynamic
            // tables so loading/loaded rendering stays identical. `hide(col)` returns
            // the hidden-column attribute string for the owning table.
            function buildTradeRowHTML(trade, hide) {
                const tradeIdx = tradesData.indexOf(trade);
                const costBasis = getCostBasis(trade);
                const currentValue = getCurrentValue(trade);
                const absoluteGain = getAbsoluteGain(trade);
                const percentGain = getPercentGain(trade);
                const dailyGain = getDailyGain(trade);
                const entryDate = new Date(trade.entry_date);
                const daysToExp = getDaysToExpiration(trade);
                const isClosed = isTradeClosed(trade);
                const mk2 = getTradeMarketKey(trade);
                const isRefreshing = !isClosed && refreshingKeys.has(mk2);
                let currentPrice;
                if (trade.exit_date) { currentPrice = trade.exit_price || 0; }
                else { const mi = marketData[mk2]; currentPrice = mi ? (mi.current_price || mi.yesterday_close) : null; }
                const mi2 = marketData[mk2];
                const sp = '<span class="cell-spinner">\u21bb</span>';
                const lastUp = isRefreshing ? sp : (mi2 && mi2.last_updated ? formatTimeSince(mi2.last_updated) : (mi2 ? 'failed' : sp));
                const ageStr = isRefreshing ? sp : (mi2 && mi2.quote_time ? formatTimeSince(mi2.quote_time) : (mi2 ? 'failed' : sp));
                const dataState = isClosed ? 'closed' : (isRefreshing || !mi2 ? 'loading' : (mi2.no_data || mi2.fetch_error || !mi2.quote_time ? 'no-data' : ''));
                const isLoading = dataState === 'loading';
                let entryColorClass = ''; if (trade.entry_goal) entryColorClass = trade.entry_price < trade.entry_goal ? 'positive' : 'negative';
                const catCls = trade.category.toLowerCase();
                return `<tr class="${dataState}" data-market-key='${mk2}' data-trade-idx='${tradeIdx}'>
                            <td data-col='Entry Date' data-sort='${entryDate.getTime()}'${hide('Entry Date')}>${formatDate(trade.entry_date)}</td>
                            <td data-col='Trade' data-sort='${getTradeDisplay(trade)}'${hide('Trade')}>${getTradeDisplay(trade)}</td>
                            <td data-col='Category' data-sort='${trade.category}'${hide('Category')}><span class="category-pill ${catCls}">${trade.category}</span></td>
                            <td data-col='Account' data-sort='${trade.account||"Unknown"}'${hide('Account')}>${trade.account||'Unknown'}</td>
                            <td data-col='Qty' data-sort='${trade.quantity}'${hide('Qty')}>${trade.quantity}</td>
                            <td class='right-align ${entryColorClass}' data-col='Entry' data-sort='${trade.entry_price}'${hide('Entry')}>${formatCurrency(trade.entry_price)}</td>
                            <td class='right-align' data-col='Entry Goal' data-sort='${trade.entry_goal||0}'${hide('Entry Goal')}>${trade.entry_goal?formatCurrency(trade.entry_goal):''}</td>
                            <td class='right-align' data-col='Current' data-sort='${currentPrice}'${hide('Current')}>${isLoading?sp:formatCurrency(currentPrice)}</td>
                            <td class='right-align' data-col='Profit' data-sort='${trade.profit_exit||0}'${hide('Profit')}>${trade.profit_exit?formatCurrency(trade.profit_exit):''}</td>
                            <td class='right-align' data-col='Loss' data-sort='${trade.loss_exit||0}'${hide('Loss')}>${trade.loss_exit?formatCurrency(trade.loss_exit):''}</td>
                            <td class='right-align' data-col='Basis' data-sort='${costBasis}'${hide('Basis')}>${formatCurrency(costBasis)}</td>
                            <td class='right-align' data-col='Value' data-sort='${currentValue}'${hide('Value')}>${isLoading?sp:formatCurrency(currentValue)}</td>
                            <td class='right-align ${getRowClass(trade,'Gain',percentGain)}' data-col='Gain' data-sort='${percentGain}'${hide('Gain')}>${isLoading?sp:(formatCurrency(absoluteGain)+'<br>'+percentGain.toFixed(2)+'%')}</td>
                            <td class='right-align ${getRowClass(trade,'Day',dailyGain.percent)}' data-col='Day' data-sort='${dailyGain.percent}'${hide('Day')}>${isLoading?sp:(dailyGain.hasData===false&&!trade.exit_date?'N/A':formatCurrency(dailyGain.absolute))+'<br>'+(isLoading?'':(dailyGain.hasData===false&&!trade.exit_date?'N/A':dailyGain.percent.toFixed(2)+'%'))}</td>
                            <td data-col='Sell Order' data-sort='${trade.sell_order_placed?1:0}'${hide('Sell Order')}>${trade.sell_order_placed?'Yes':'No'}</td>
                            <td class='${getRowClass(trade,'Expires')}' data-col='Expires' data-sort='${trade.type==='option'?new Date(trade.expiration).getTime():-1e12}'${hide('Expires')}>${daysToExp||''}</td>
                            <td data-col='Updated' data-sort='${mi2&&mi2.last_updated?mi2.last_updated:0}'${hide('Updated')}>${lastUp}</td>
                            <td data-col='Age' data-sort='${mi2&&mi2.quote_time?mi2.quote_time:0}'${hide('Age')}>${ageStr}</td>
                            <td class="action-col"><button class="edit-trade-btn" onclick="showEditTradeModal(${tradeIdx})" title="Edit trade">✎</button><button class="sell-portion-btn" onclick="showSellPortionModal(${tradeIdx})" title="Sell portion">✂</button><button class="refresh-trade-btn" onclick="refreshTrade(${tradeIdx})" title="Refresh ticker">↻</button><button class="delete-trade-btn" onclick="deleteTrade(${tradeIdx})" title="Delete trade">×</button></td>
                        </tr>`;
            }

            // Derive a hide(col) function from a rendered table's header state.
            function hideFromTable(table) {
                const hiddenSet = new Set();
                table.querySelectorAll('thead th[data-col]').forEach(th => {
                    if (th.classList.contains('column-hidden')) hiddenSet.add(th.getAttribute('data-col'));
                });
                return col => hiddenSet.has(col) ? ' class="column-hidden" style="display:none;"' : '';
            }

            // Re-render in place every row (across all tables) bound to a market key.
            function patchRowsForKey(key) {
                document.querySelectorAll(`tr[data-market-key="${key}"]`).forEach(tr => {
                    const table = tr.closest('table');
                    if (!table) return;
                    const idx = parseInt(tr.getAttribute('data-trade-idx'), 10);
                    const trade = tradesData[idx];
                    if (!trade) return;
                    tr.outerHTML = buildTradeRowHTML(trade, hideFromTable(table));
                });
                // Summary cards derive from these rows, so refresh them too — a card
                // clears its spinner once none of its trades are still refreshing.
                renderSummary();
            }

            function generateTable() {
                let filteredTrades = [...tradesData];
                
                // Read filters from inline controls
                const statusSel = document.getElementById('mainStatus');
                const filterValue = statusSel ? statusSel.value : 'open';
                if (filterValue === 'open') {
                    filteredTrades = filteredTrades.filter(trade => !isTradeClosed(trade));
                } else if (filterValue === 'closed') {
                    filteredTrades = filteredTrades.filter(trade => isTradeClosed(trade));
                }
                
                const catSel = document.getElementById('mainCategory');
                const categoryVal = catSel ? catSel.value : 'all';
                if (categoryVal !== 'all') {
                    filteredTrades = filteredTrades.filter(trade => trade.category === categoryVal);
                }

                // Read visible columns from inline column menu
                const colMenu = document.getElementById('dynColMenu_main');
                const visibleCols = colMenu
                    ? Array.from(colMenu.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.getAttribute('data-column'))
                    : [...defaultDynCols];
                const hiddenSet = new Set(allColumns.filter(c => !visibleCols.includes(c)));
                const hide = col => hiddenSet.has(col) ? ' class="column-hidden" style="display:none;"' : '';

                // Calculate summary data
                let totalBasis = 0;
                let totalValue = 0;
                let totalDayGain = 0;
                let totalYesterdayValue = 0;
                let hasValidDayData = false;

                filteredTrades.forEach(trade => {
                    const basis = getCostBasis(trade);
                    const value = getCurrentValue(trade);
                    const dailyGain = getDailyGain(trade);
                    totalBasis += basis;
                    totalValue += value;
                    if (dailyGain.hasData || trade.exit_date) {
                        totalDayGain += dailyGain.absolute;
                        totalYesterdayValue += value - dailyGain.absolute;
                        hasValidDayData = true;
                    }
                });

                const totalGain = totalValue - totalBasis;
                const totalGainPercent = totalBasis !== 0 ? (totalGain / totalBasis) * 100 : 0;
                const totalDayPercent = totalYesterdayValue !== 0 ? (totalDayGain / totalYesterdayValue) * 100 : 0;

                updateInlineStats('mainTableStats', totalBasis, totalValue, totalGain, totalGainPercent, totalDayGain, totalDayPercent, hasValidDayData, filteredTrades.length);

                const tableId = `tradeTable_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
                const html = `<table class="trade-table" id="${tableId}">
                    <thead><tr>
                        ${allColumns.map(c => `<th data-col='${c}'${hide(c)}>${c}</th>`).join('')}
                        <th class="action-col"></th>
                    </tr>
                    <tr class="summary-row">
                        ${allColumns.map(c => {
                            if (c === 'Basis') return `<td class='right-align' data-col='${c}'${hide(c)}>${formatCurrency(totalBasis)}</td>`;
                            if (c === 'Value') return `<td class='right-align' data-col='${c}'${hide(c)}>${formatCurrency(totalValue)}</td>`;
                            if (c === 'Gain') return `<td class='right-align ${totalGain>=0?'positive':'negative'}' data-col='${c}'${hide(c)}>${formatCurrency(totalGain)}<br>${totalGainPercent.toFixed(2)}%</td>`;
                            if (c === 'Day') return `<td class='right-align ${totalDayGain>=0?'positive':'negative'}' data-col='${c}'${hide(c)}>${hasValidDayData?formatCurrency(totalDayGain):'N/A'}<br>${hasValidDayData?totalDayPercent.toFixed(2)+'%':'N/A'}</td>`;
                            return `<td data-col='${c}'${hide(c)}></td>`;
                        }).join('')}
                        <td class="action-col"></td>
                    </tr></thead>
                    <tbody>${filteredTrades.map(trade => buildTradeRowHTML(trade, hide)).join('')}</tbody></table>`;

                document.getElementById('tableContainer').innerHTML = html;
                setupTableSorting(tableId);
                renderSummary();
                saveState();
            }

            // Table sorting functionality
            function setupTableSorting(tableId) {
                const table = document.getElementById(tableId);
                const headers = table.querySelectorAll('th');
                const tbody = table.querySelector('tbody');

                headers.forEach(header => {
                    const col = header.getAttribute('data-col');
                    
                    header.addEventListener('click', function(e) {
                        // Don't sort if clicking on the resize handle
                        if (e.target.classList.contains('resize-handle')) {
                            return;
                        }
                        
                        // Don't sort if the header was recently resized
                        if (header.style.pointerEvents === 'none') {
                            return;
                        }
                        
                        // Update global sort state
                        if (currentSortState.column === col) {
                            // Same column - toggle direction
                            currentSortState.descending = !currentSortState.descending;
                        } else {
                            // Different column - sort descending by default
                            currentSortState.column = col;
                            currentSortState.descending = true;
                        }

                        // Update header display and sort table
                        updateHeadersAndSort(table);
                        saveState();
                    });
                });

                // Apply current sort state to the table
                updateHeadersAndSort(table);
                addResizeHandles(table);
            }

            // ===== Column Resize =====
            function addResizeHandles(table) {
                const allHeaders = table.querySelectorAll('th');
                const dataHeaders = table.querySelectorAll('th[data-col]');

                // Capture natural auto-layout widths before switching to fixed
                const widths = new Map();
                allHeaders.forEach(h => { widths.set(h, h.getBoundingClientRect().width); });

                table.style.tableLayout = 'fixed';
                table.style.width = 'auto';
                table.style.minWidth = '100%';

                // Apply captured widths to all headers
                allHeaders.forEach(h => { h.style.width = widths.get(h) + 'px'; });

                dataHeaders.forEach(header => {
                    if (header.querySelector('.resize-handle')) return;
                    const handle = document.createElement('div');
                    handle.className = 'resize-handle';
                    header.appendChild(handle);

                    function startResize(startX) {
                        const startW = header.getBoundingClientRect().width;
                        header.classList.add('resizing');
                        document.body.classList.add('col-resizing');

                        function onMove(x) {
                            const w = Math.max(30, startW + x - startX);
                            header.style.width = w + 'px';
                        }
                        function onMouseMove(ev) { onMove(ev.pageX); }
                        function onTouchMove(ev) { ev.preventDefault(); onMove(ev.touches[0].pageX); }
                        function onEnd() {
                            document.removeEventListener('mousemove', onMouseMove);
                            document.removeEventListener('mouseup', onEnd);
                            document.removeEventListener('touchmove', onTouchMove);
                            document.removeEventListener('touchend', onEnd);
                            header.classList.remove('resizing');
                            document.body.classList.remove('col-resizing');
                            header.style.pointerEvents = 'none';
                            setTimeout(() => { header.style.pointerEvents = ''; }, 100);
                        }
                        document.addEventListener('mousemove', onMouseMove);
                        document.addEventListener('mouseup', onEnd);
                        document.addEventListener('touchmove', onTouchMove, { passive: false });
                        document.addEventListener('touchend', onEnd);
                    }

                    handle.addEventListener('mousedown', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        startResize(e.pageX);
                    });
                    handle.addEventListener('touchstart', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        startResize(e.touches[0].pageX);
                    }, { passive: false });
                });
            }

            function updateHeadersAndSort(table) {
                const headers = table.querySelectorAll('th');
                
                // Reset all headers to plain text (preserve resize handles)
                headers.forEach(header => {
                    const col = header.getAttribute('data-col');
                    if (col) {
                        const handle = header.querySelector('.resize-handle');
                        header.textContent = col;
                        if (handle) header.appendChild(handle);
                    }
                });

                // Update the currently sorted column header
                const sortedHeader = table.querySelector(`th[data-col="${currentSortState.column}"]`);
                if (sortedHeader) {
                    const arrow = currentSortState.descending ? ' ↑' : ' ↓';
                    const handle = sortedHeader.querySelector('.resize-handle');
                    sortedHeader.textContent = currentSortState.column + arrow;
                    if (handle) sortedHeader.appendChild(handle);
                }

                // Sort the table
                sortTable(table, currentSortState.column, currentSortState.descending);
            }

            function sortTable(table, column, descending) {
                const tbody = table.querySelector('tbody');
                const rows = Array.from(tbody.querySelectorAll('tr'));
                
                rows.sort((a, b) => {
                    const aCell = a.querySelector(`td[data-col="${column}"]`);
                    const bCell = b.querySelector(`td[data-col="${column}"]`);
                    const aValue = aCell ? (parseFloat(aCell.getAttribute('data-sort')) || aCell.getAttribute('data-sort') || '') : '';
                    const bValue = bCell ? (parseFloat(bCell.getAttribute('data-sort')) || bCell.getAttribute('data-sort') || '') : '';
                    
                    if (aValue === '' && bValue === '') return 0;
                    if (aValue === '') return 1;
                    if (bValue === '') return -1;
                    
                    if (!isNaN(aValue) && !isNaN(bValue)) {
                        return descending ? bValue - aValue : aValue - bValue;
                    }
                    
                    return descending ? String(bValue).localeCompare(String(aValue)) : String(aValue).localeCompare(String(bValue));
                });

                // Clear and repopulate tbody
                while (tbody.firstChild) {
                    tbody.removeChild(tbody.firstChild);
                }
                rows.forEach(row => tbody.appendChild(row));
            }

            // ===== Access Gate (basic client-side password) =====
            const ACCESS_FLAG_KEY = 'heresy_access_granted';
            const ACCESS_PASSWORD_SHA256 = 'c777d8bf19fc4ec1eb98c9b454d75f813c538f6c723001072426102cc1b1a482';

            async function sha256Hex(text) {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(text);
                const digest = await crypto.subtle.digest('SHA-256', bytes);
                return Array.from(new Uint8Array(digest))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');
            }

            function hasAccess() {
                try {
                    return localStorage.getItem(ACCESS_FLAG_KEY) === '1';
                } catch (_err) {
                    return false;
                }
            }

            function grantAccess() {
                try {
                    localStorage.setItem(ACCESS_FLAG_KEY, '1');
                } catch (_err) {
                    // If storage is unavailable we still allow this session.
                }
            }

            function revokeAccess() {
                try {
                    localStorage.removeItem(ACCESS_FLAG_KEY);
                } catch (_err) {
                    // Ignore storage errors.
                }
            }

            function showAccessGate() {
                const overlay = document.createElement('div');
                overlay.id = 'accessOverlay';
                overlay.style.position = 'fixed';
                overlay.style.inset = '0';
                overlay.style.background = 'rgba(10, 12, 20, 0.88)';
                overlay.style.display = 'flex';
                overlay.style.alignItems = 'center';
                overlay.style.justifyContent = 'center';
                overlay.style.zIndex = '99999';
                overlay.innerHTML = `
                    <div style="width: min(92vw, 420px); background: #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); padding: 24px; font-family: 'Courier New', Courier, monospace;">
                        <h2 style="margin: 0 0 10px 0; font-size: 20px;">Portfolio Access</h2>
                        <p style="margin: 0 0 14px 0; font-size: 12px; color: #555; line-height: 1.5;">Enter password to unlock this dashboard on this browser.</p>
                        <form id="accessForm" autocomplete="off">
                            <input id="accessPassword" type="password" placeholder="Password" style="width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;" />
                            <div id="accessError" style="display: none; margin-top: 10px; color: #b00020; font-size: 12px;">Incorrect password.</div>
                            <button type="submit" style="margin-top: 14px; width: 100%; padding: 10px 12px; font-size: 13px; border: none; border-radius: 6px; background: #007acc; color: #fff; cursor: pointer;">Unlock</button>
                        </form>
                    </div>
                `;

                document.body.appendChild(overlay);

                const form = document.getElementById('accessForm');
                const pwd = document.getElementById('accessPassword');
                const err = document.getElementById('accessError');
                if (pwd) pwd.focus();

                form.addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const entered = (pwd.value || '').trim();
                    const enteredHash = await sha256Hex(entered);
                    if (enteredHash === ACCESS_PASSWORD_SHA256) {
                        grantAccess();
                        overlay.remove();
                        window.location.reload();
                        return;
                    }
                    err.style.display = 'block';
                    pwd.select();
                });
            }

            // Helper available in browser console to force re-auth.
            window.heresyLogout = function() {
                revokeAccess();
                window.location.reload();
            };


            

            // Main application logic
            (async function() {
                if (!hasAccess()) {
                    showAccessGate();
                    return;
                }

                const refreshBtn = document.getElementById('refreshBtn');
                const refreshTime = document.getElementById('refreshTime');
                const refreshMenuBtn = document.getElementById('refreshMenuBtn');
                const refreshMenu = document.getElementById('refreshMenu');

                function closeRefreshMenu() {
                    if (refreshMenu) refreshMenu.style.display = 'none';
                }
                function toggleRefreshMenu() {
                    if (!refreshMenu) return;
                    refreshMenu.style.display = refreshMenu.style.display === 'block' ? 'none' : 'block';
                }
                
                // Auto-refresh functionality
                let autoRefreshInterval = null;
                const autoRefreshCheckbox = document.createElement('input');
                autoRefreshCheckbox.type = 'checkbox';
                autoRefreshCheckbox.id = 'autoRefreshCheckbox';
                autoRefreshCheckbox.style.marginLeft = '10px';
                
                const autoRefreshLabel = document.createElement('label');
                autoRefreshLabel.htmlFor = 'autoRefreshCheckbox';
                autoRefreshLabel.textContent = ' Auto-refresh (5s)';
                autoRefreshLabel.style.marginLeft = '5px';
                autoRefreshLabel.style.fontSize = '14px';
                
                // Insert checkbox after the whole refresh button group (so the caret
                // stays flush against the main button).
                const refreshGroupEl = document.getElementById('refreshGroup');
                const refreshAnchor = refreshGroupEl || refreshBtn;
                refreshAnchor.parentNode.insertBefore(autoRefreshCheckbox, refreshAnchor.nextSibling);
                refreshAnchor.parentNode.insertBefore(autoRefreshLabel, autoRefreshCheckbox.nextSibling);

                // Function to update the last refresh time
                function updateRefreshTime() {
                    const now = new Date();
                    const timeString = now.toLocaleTimeString();
                    const dateString = now.toLocaleDateString();
                    refreshTime.textContent = `${dateString} at ${timeString}`;
                }

                // Function to refresh market data from Polygon API.
                // scope: 'visible'     -> only rows currently shown in the main table (default)
                //        'all'         -> every open trade, visible rows prioritized first
                //        'allHistory'  -> 'all' followed by historical data
                //        'historyOnly' -> historical data only (no quote re-fetch)
                async function refreshData(scope) {
                    if (typeof scope !== 'string') scope = 'visible';
                    const scopeLabel = scope === 'visible' ? 'visible rows' : 'all rows';
                    refreshBtn.textContent = scope === 'historyOnly' ? 'Loading history...' : `Refreshing ${scopeLabel}...`;
                    refreshBtn.disabled = true;
                    refreshMenuBtn.disabled = true;
                    closeRefreshMenu();

                    try {
                        const all = getUniqueTickers();
                        const allKeys = [...all.stocks, ...all.options];
                        const visibleSet = getVisibleMarketKeys();

                        // Decide which keys to fetch, ordered so visible rows go first.
                        const visibleKeys = allKeys.filter(k => visibleSet.has(k));
                        const restKeys = allKeys.filter(k => !visibleSet.has(k));
                        let batches;
                        if (scope === 'historyOnly') {
                            batches = []; // history-only skips quote re-fetching entirely
                        } else if (scope === 'visible') {
                            batches = [visibleKeys];
                        } else {
                            batches = [visibleKeys, restKeys].filter(b => b.length);
                        }
                        const grandTotal = batches.reduce((s, b) => s + b.length, 0);
                        console.log('Refreshing scope:', scope, 'keys:', grandTotal);

                        // Put every row being refreshed into a loading state up front,
                        // then fill rows in one-by-one as each ticker resolves.
                        refreshingKeys = new Set(batches.flat());
                        generateTable();
                        Object.keys(dynamicPanelConfigs).forEach(panelId => {
                            const numId = parseInt(panelId.replace('dynPanel_', ''));
                            if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                        });

                        // Fetch batch by batch so the visible batch completes before the rest starts.
                        let doneBase = 0;
                        for (const batch of batches) {
                            await fetchMarketData(keysToGroups(batch), (done) => {
                                refreshBtn.textContent = grandTotal ? `Refreshing ${scopeLabel} ${doneBase + done}/${grandTotal}...` : `Refreshing ${scopeLabel}...`;
                            }, (key) => {
                                refreshingKeys.delete(key);
                                patchRowsForKey(key);
                            });
                            doneBase += batch.length;
                        }

                        if (scope === 'allHistory' || scope === 'historyOnly') {
                            refreshBtn.textContent = 'Loading history...';
                            await fetchHistoricalData('1M', 'open', (done, total) => {
                                refreshBtn.textContent = total ? `Loading history ${done}/${total}...` : 'Loading history...';
                            });
                        }

                        updateRefreshTime();

                        console.log('Data refreshed at:', new Date().toLocaleTimeString());
                    } catch (error) {
                        console.error('Error refreshing data:', error);
                    } finally {
                        refreshingKeys.clear();
                        refreshBtn.textContent = 'Refresh';
                        refreshBtn.disabled = false;
                        refreshMenuBtn.disabled = false;
                        // Regenerate all tables with updated data (fixes totals + sorting)
                        generateTable();
                        Object.keys(dynamicPanelConfigs).forEach(panelId => {
                            const numId = parseInt(panelId.replace('dynPanel_', ''));
                            if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                        });
                    }
                }

                // Expose for the global settings panel to trigger a refresh after provider changes.
                window.refreshData = refreshData;
                
                // Auto-refresh toggle function
                function toggleAutoRefresh() {
                    if (autoRefreshCheckbox.checked) {
                        console.log('Auto-refresh enabled: every 5 seconds');
                        autoRefreshInterval = setInterval(refreshData, 1500); // 5 seconds
                    } else {
                        console.log('Auto-refresh disabled');
                        if (autoRefreshInterval) {
                            clearInterval(autoRefreshInterval);
                            autoRefreshInterval = null;
                        }
                    }
                }

                // Initialize on page load - fetch data immediately
                async function initialize() {
                    updateRefreshTime();
                    
                    // Fetch initial market data
                    refreshBtn.textContent = 'Loading...';
                    refreshBtn.disabled = true;
                    
                    try {
                        const tickerGroups = getUniqueTickers();
                        console.log('Initial data fetch for stocks:', tickerGroups.stocks);
                        console.log('Initial data fetch for options:', tickerGroups.options);

                        // Render every active row in a loading state immediately, then
                        // fill rows in one-by-one as each ticker resolves.
                        refreshingKeys = new Set([...tickerGroups.stocks, ...tickerGroups.options]);
                        generateTable();

                        await fetchMarketData(tickerGroups, (done, total) => {
                            refreshBtn.textContent = total ? `Loading quotes ${done}/${total}...` : 'Loading...';
                        }, (key) => {
                            refreshingKeys.delete(key);
                            patchRowsForKey(key);
                        });
                        console.log('Initial market data fetch completed successfully');
                        
                        // Also fetch some basic historical data to enable daily gains
                        console.log('Fetching basic historical data for daily gains...');
                        await fetchHistoricalData('1M', 'open', (done, total) => {
                            refreshBtn.textContent = total ? `Loading history ${done}/${total}...` : 'Loading...';
                        }); // Fetch 1 month of data for open trades
                        console.log('Basic historical data fetch completed');
                        
                    } catch (error) {
                        console.error('Error fetching initial data:', error);
                    } finally {
                        refreshingKeys.clear();
                        refreshBtn.textContent = 'Refresh';
                        refreshBtn.disabled = false;
                        
                        // Generate table after market data is fetched (or failed)
                        generateTable();
                        // Re-render all dynamic tables so they pick up fresh market data
                        Object.keys(dynamicPanelConfigs).forEach(panelId => {
                            const numId = parseInt(panelId.replace('dynPanel_', ''));
                            if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                        });
                    }
                }

                // Load saved state before initializing
                const savedState = await loadState();
                if (savedState && savedState.trades && Array.isArray(savedState.trades) && savedState.trades.length > 0
                    && savedState.dataVersion === DATA_VERSION) {
                    tradesData.length = 0;
                    savedState.trades.forEach(t => tradesData.push(t));
                }

                // If no trades loaded from localStorage, use default trades from heresy-trades.js
                if (tradesData.length === 0 && typeof defaultTradesData !== 'undefined'
                    && defaultTradesData.trades && Array.isArray(defaultTradesData.trades)) {
                    defaultTradesData.trades.forEach(t => tradesData.push(t));
                }

                // Initialize on page load
                initialize();
                initSummaryAdd();
                initSectionDragDrop();
                initCardDragDrop();
                initRename();

                // Close panel column menus on outside click (but not when clicking inside the menu)
                document.addEventListener('click', (e) => {
                    if (e.target.closest('.panel-col-menu') || e.target.closest('.panel-col-dropdown button')) return;
                    document.querySelectorAll('.panel-col-menu.show').forEach(m => m.classList.remove('show'));
                });

                // Apply saved display config after DOM is ready
                if (savedState && savedState.display) {
                    applyDisplayConfig(savedState.display);
                    restoreDynamicPanels();
                    // Re-apply collapsed state now that dynamic panels exist in the DOM
                    if (savedState.display.collapsedSections) {
                        savedState.display.collapsedSections.forEach(id => {
                            const el = document.getElementById(id);
                            if (el) el.classList.add('collapsed');
                        });
                    }
                } else if (typeof defaultTradesData !== 'undefined' && defaultTradesData.display) {
                    // First load with no saved state: use the default portfolio's
                    // sections/cards from heresy-trades.js.
                    applyDisplayConfig(defaultTradesData.display);
                    restoreDynamicPanels();
                    if (defaultTradesData.display.collapsedSections) {
                        defaultTradesData.display.collapsedSections.forEach(id => {
                            const el = document.getElementById(id);
                            if (el) el.classList.add('collapsed');
                        });
                    }
                } else {
                    // First load: create a default chart
                    addDynamicChart({ period: '6M', filter: 'all' });
                    sectionNames[`dynPanel_${dynamicIdCounter - 1}`] = 'Historical Performance';
                }

                // Export / Import handlers
                document.getElementById('exportBtn').addEventListener('click', exportJSON);
                document.getElementById('importFile').addEventListener('change', function(e) {
                    if (e.target.files.length > 0) {
                        importJSON(e.target.files[0]);
                        e.target.value = ''; // reset so same file can be re-imported
                    }
                });
                
                // Load URL parameters after other initializations
                setTimeout(() => {
                    loadFromURLParams();
                    generateTable(); // Regenerate table with URL parameters
                }, 100);

                // Add event listeners
                refreshBtn.addEventListener('click', () => refreshData('visible'));
                if (refreshMenuBtn) {
                    refreshMenuBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleRefreshMenu();
                    });
                }
                if (refreshMenu) {
                    refreshMenu.querySelectorAll('.refresh-menu-item').forEach(item => {
                        item.addEventListener('click', (e) => {
                            e.stopPropagation();
                            closeRefreshMenu();
                            refreshData(item.getAttribute('data-scope'));
                        });
                    });
                }
                // Close the refresh menu when clicking anywhere else.
                document.addEventListener('click', (e) => {
                    const group = document.getElementById('refreshGroup');
                    if (group && !group.contains(e.target)) closeRefreshMenu();
                });
                autoRefreshCheckbox.addEventListener('change', toggleAutoRefresh);
                
                // Cleanup auto-refresh when page is closed/refreshed
                window.addEventListener('beforeunload', function() {
                    if (autoRefreshInterval) {
                        clearInterval(autoRefreshInterval);
                    }
                });
            })();
        </script>
    </div>
</body>
</html>
