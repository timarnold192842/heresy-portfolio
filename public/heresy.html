            // ===== LocalStorage + Server Persistence =====
            const LS_KEY = 'heresy_portfolio_state';
            const STORAGE_API_URL = '/api/state';
            const WRITE_TOKEN_KEY = 'heresy_write_token';
            const DATA_VERSION = 6; // Bump to force JSON file trades to override localStorage
            const defaultSummaryEntries = [
                { id: 1, status: 'open', category: 'all' },
                { id: 2, status: 'all', category: 'Asymmetric' },
                { id: 3, status: 'all', category: 'Resource' }
            ];

            let saveSyncTimer = null;
            let saveSyncInFlight = false;
            let pendingRemoteState = null;

            function getWriteToken() {
                try {
                    return localStorage.getItem(WRITE_TOKEN_KEY) || '';
                } catch (_err) {
                    return '';
                }
            }

            async function pushStateToServer(state) {
                const headers = {
                    'Content-Type': 'application/json'
                };
                const token = getWriteToken();
                if (token) headers['x-write-token'] = token;

                const response = await fetch(STORAGE_API_URL, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({ state })
                });

                if (!response.ok) {
                    throw new Error(`Remote save failed (${response.status})`);
                }
            }

            function queueRemoteSave(state) {
                pendingRemoteState = state;
                if (saveSyncTimer) clearTimeout(saveSyncTimer);

                saveSyncTimer = setTimeout(async () => {
                    if (saveSyncInFlight || !pendingRemoteState) return;
                    saveSyncInFlight = true;
                    const stateToPush = pendingRemoteState;
                    pendingRemoteState = null;

                    try {
                        await pushStateToServer(stateToPush);
                    } catch (e) {
                        // Keep local persistence working even if network sync fails.
                        console.warn('Cloud sync failed; local state still saved.', e);
                        pendingRemoteState = stateToPush;
                    } finally {
                        saveSyncInFlight = false;
                        if (pendingRemoteState) queueRemoteSave(pendingRemoteState);
                    }
                }, 600);
            }

            // ===== Section Management =====
            let sectionOrder = ['summarySection', 'mainTableSection'];
            let sectionNames = {};
            let dynamicPanelConfigs = {};

            function getSectionName(id) {
                if (sectionNames[id]) return sectionNames[id];
                if (id === 'summarySection') return 'Summary';
                if (id === 'mainTableSection') return 'Trades';

                return id;
            }

            function ensureSectionOrder() {
                const container = document.getElementById('sectionsContainer');
                if (!container) return;
                sectionOrder.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && el.parentNode === container) container.appendChild(el);
                });
            }

            function commitSectionOrder() {
                const container = document.getElementById('sectionsContainer');
                if (!container) return;
                const newOrder = [];
                for (const child of container.children) {
                    if (child.dataset && child.dataset.sectionId) newOrder.push(child.dataset.sectionId);
                }
                sectionOrder = newOrder;
                saveState();
            }

            // ===== Section Drag & Drop =====
            let sectionDragState = null;
            let sectionDragRAF = null;
            let _lastMousedownEl = null;
            document.addEventListener('mousedown', (e) => { _lastMousedownEl = e.target; }, true);

            function initSectionDragDrop() {
                const container = document.getElementById('sectionsContainer');
                container.addEventListener('dragstart', handleSectionDragStart, true);
                container.addEventListener('dragend', handleSectionDragEnd, true);
                container.addEventListener('dragover', handleSectionDragOver);
                container.addEventListener('drop', handleSectionDrop);
            }

            function handleSectionDragStart(e) {
                const item = e.target.closest('.draggable-section');
                if (!item) return;
                // Don't interfere with summary card drags
                if (_lastMousedownEl && _lastMousedownEl.closest('.summary-card')) return;
                // Only allow drag from section bar
                if (!_lastMousedownEl || !_lastMousedownEl.closest('.section-bar')) { e.preventDefault(); return; }
                e.stopPropagation();
                sectionDragState = { el: item, committed: false };
                e.dataTransfer.effectAllowed = 'move';
                const dragImage = item.cloneNode(true);
                dragImage.style.position = 'absolute';
                dragImage.style.top = '-9999px';
                dragImage.style.width = item.offsetWidth + 'px';
                dragImage.style.opacity = '0.7';
                document.body.appendChild(dragImage);
                e.dataTransfer.setDragImage(dragImage, e.offsetX, e.offsetY);
                setTimeout(() => {
                    if (dragImage.parentNode) document.body.removeChild(dragImage);
                    item.classList.add('dragging');
                }, 0);
            }

            function handleSectionDragEnd(e) {
                if (!sectionDragState) return;
                if (sectionDragRAF) { cancelAnimationFrame(sectionDragRAF); sectionDragRAF = null; }
                sectionDragState.el.classList.remove('dragging');
                if (!sectionDragState.committed) ensureSectionOrder();
                sectionDragState = null;
            }

            function handleSectionDragOver(e) {
                if (!sectionDragState) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (sectionDragRAF) return;
                const mouseY = e.clientY;
                const eventTarget = e.target;
                sectionDragRAF = requestAnimationFrame(() => {
                    sectionDragRAF = null;
                    if (!sectionDragState) return;
                    sectionLivePreview(mouseY, eventTarget);
                });
            }

            function sectionLivePreview(mouseY, eventTarget) {
                const { el: dragEl } = sectionDragState;
                const container = document.getElementById('sectionsContainer');
                let target = eventTarget.closest('.draggable-section');
                if (!target || target === dragEl || target.parentNode !== container) return;
                const rect = target.getBoundingClientRect();
                const before = mouseY < rect.top + rect.height / 2;
                const desiredNext = before ? target : target.nextSibling;
                if (dragEl.nextSibling === desiredNext && dragEl.parentNode === container) return;
                const siblings = Array.from(container.children).filter(c => c.classList.contains('draggable-section'));
                const firstRects = new Map();
                siblings.forEach(el => firstRects.set(el, el.getBoundingClientRect()));
                container.insertBefore(dragEl, desiredNext);
                siblings.forEach(el => {
                    const first = firstRects.get(el);
                    if (!first) return;
                    const last = el.getBoundingClientRect();
                    const dy = first.top - last.top;
                    if (Math.abs(dy) < 2) return;
                    el.style.transform = `translateY(${dy}px)`;
                    el.style.transition = 'none';
                    el.offsetHeight;
                    el.style.transition = 'transform 150ms ease';
                    el.style.transform = '';
                    el.addEventListener('transitionend', function cleanup() {
                        el.style.transition = '';
                        el.style.transform = '';
                        el.removeEventListener('transitionend', cleanup);
                    });
                });
            }

            function handleSectionDrop(e) {
                e.preventDefault();
                if (!sectionDragState) return;
                sectionDragState.committed = true;
                sectionDragState.el.classList.remove('dragging');
                commitSectionOrder();
            }

            // ===== Summary Card Drag & Drop =====
            let cardDragState = null;
            let cardDragRAF = null;

            function initCardDragDrop() {
                const container = document.getElementById('summaryCards');
                container.addEventListener('dragstart', handleCardDragStart, true);
                container.addEventListener('dragend', handleCardDragEnd, true);
                container.addEventListener('dragover', handleCardDragOver);
                container.addEventListener('drop', handleCardDrop);
            }

            function handleCardDragStart(e) {
                const card = e.target.closest('.summary-card');
                if (!card) return;
                e.stopPropagation();
                cardDragState = { el: card, committed: false };
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => card.classList.add('dragging'), 0);
            }

            function handleCardDragEnd(e) {
                if (!cardDragState) return;
                if (cardDragRAF) { cancelAnimationFrame(cardDragRAF); cardDragRAF = null; }
                cardDragState.el.classList.remove('dragging');
                if (!cardDragState.committed) renderSummary();
                cardDragState = null;
            }

            function handleCardDragOver(e) {
                if (!cardDragState) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (cardDragRAF) return;
                const mouseX = e.clientX;
                const target = e.target;
                cardDragRAF = requestAnimationFrame(() => {
                    cardDragRAF = null;
                    if (!cardDragState) return;
                    const card = target.closest('.summary-card');
                    if (!card || card === cardDragState.el) return;
                    const rect = card.getBoundingClientRect();
                    const before = mouseX < rect.left + rect.width / 2;
                    const container = document.getElementById('summaryCards');
                    const desiredNext = before ? card : card.nextSibling;
                    if (cardDragState.el.nextSibling === desiredNext) return;
                    const cards = Array.from(container.children);
                    const firstRects = new Map();
                    cards.forEach(c => firstRects.set(c, c.getBoundingClientRect()));
                    container.insertBefore(cardDragState.el, desiredNext);
                    cards.forEach(c => {
                        const first = firstRects.get(c);
                        if (!first) return;
                        const last = c.getBoundingClientRect();
                        const dx = first.left - last.left;
                        const dy = first.top - last.top;
                        if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
                        c.style.transform = `translate(${dx}px, ${dy}px)`;
                        c.style.transition = 'none';
                        c.offsetHeight;
                        c.style.transition = 'transform 150ms ease';
                        c.style.transform = '';
                        c.addEventListener('transitionend', function cleanup() {
                            c.style.transition = '';
                            c.style.transform = '';
                            c.removeEventListener('transitionend', cleanup);
                        });
                    });
                });
            }

            function handleCardDrop(e) {
                e.preventDefault();
                if (!cardDragState) return;
                cardDragState.committed = true;
                cardDragState.el.classList.remove('dragging');
                const container = document.getElementById('summaryCards');
                const newOrder = [];
                for (const child of container.children) {
                    const id = parseInt(child.dataset.entryId);
                    const entry = summaryEntries.find(en => en.id === id);
                    if (entry) newOrder.push(entry);
                }
                summaryEntries = newOrder;
                saveState();
            }

            // ===== Rename =====
            function initRename() {
                document.addEventListener('dblclick', function(e) {
                    const title = e.target.closest('.section-title');
                    if (!title) return;
                    const sectionId = title.dataset.sectionId;
                    if (!sectionId) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const currentName = title.textContent;
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = currentName;
                    input.className = 'section-title-input';
                    input.style.width = Math.max(100, currentName.length * 10) + 'px';
                    title.replaceWith(input);
                    input.focus();
                    input.select();
                    function commit() {
                        const newName = input.value.trim() || currentName;
                        sectionNames[sectionId] = newName;
                        const h2 = document.createElement('h2');
                        h2.className = 'section-title';
                        h2.dataset.sectionId = sectionId;
                        h2.textContent = newName;
                        input.replaceWith(h2);
                        saveState();
                    }
                    input.addEventListener('blur', commit);
                    input.addEventListener('keydown', function(ev) {
                        if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                        if (ev.key === 'Escape') { input.value = currentName; input.blur(); }
                    });
                });

                document.addEventListener('dblclick', function(e) {
                    const label = e.target.closest('.card-label-text');
                    if (!label) return;
                    const entryId = parseInt(label.dataset.entryId);
                    if (isNaN(entryId)) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const entry = summaryEntries.find(en => en.id === entryId);
                    if (!entry) return;
                    const currentName = label.textContent;
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = entry.customName || currentName;
                    input.className = 'section-title-input';
                    input.style.fontSize = '11px';
                    input.style.width = Math.max(60, currentName.length * 7) + 'px';
                    label.replaceWith(input);
                    input.focus();
                    input.select();
                    function commit() {
                        const newName = input.value.trim();
                        if (newName && newName !== summaryLabel(entry)) {
                            entry.customName = newName;
                        } else {
                            delete entry.customName;
                        }
                        renderSummary();
                        saveState();
                    }
                    input.addEventListener('blur', commit);
                    input.addEventListener('keydown', function(ev) {
                        if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                        if (ev.key === 'Escape') { input.value = currentName; input.blur(); }
                    });
                });
            }

            // ===== Inline Stats =====
            function updateInlineStats(elemId, basis, value, gain, gainPct, dayGain, dayPct, hasDay, tradeCount) {
                const el = document.getElementById(elemId);
                if (!el) return;
                const gCls = gain >= 0 ? 'positive' : 'negative';
                const dCls = dayGain >= 0 ? 'positive' : 'negative';
                el.innerHTML = `<span class="stat-item"><span class="stat-label">Basis:</span> <span class="stat-value">${formatCurrency(basis)}</span></span>` +
                    `<span class="stat-item"><span class="stat-label">Value:</span> <span class="stat-value">${formatCurrency(value)}</span></span>` +
                    `<span class="stat-item"><span class="stat-label">Gain:</span> <span class="stat-value ${gCls}">${formatCurrency(gain)} (${gainPct.toFixed(1)}%)</span></span>` +
                    `<span class="stat-item"><span class="stat-label">Day:</span> <span class="stat-value ${dCls}">${hasDay ? formatCurrency(dayGain) + ' (' + dayPct.toFixed(1) + '%)' : 'N/A'}</span></span>` +

            function togglePanelColMenu(id, e) {

            function resetColumnsToDefault(id, renderFn) {
                const menu = document.getElementById(`dynColMenu_${id}`);

            function getDisplayConfig() {
                const mainColMenu = document.getElementById('dynColMenu_main');
                const mainVisibleCols = mainColMenu
                    ? Array.from(mainColMenu.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.getAttribute('data-column'))
                    : [...defaultDynCols];
                return {
                    sectionOrder,
                    sectionNames,
                    dynamicPanelConfigs,
                    summaryEntries,
                    summaryIdCounter,
                    dynamicIdCounter,
                    sortState: currentSortState,
                    mainTableConfig: {
                        status: document.getElementById('mainStatus') ? document.getElementById('mainStatus').value : 'open',
                        category: document.getElementById('mainCategory') ? document.getElementById('mainCategory').value : 'all',
                        visibleColumns: mainVisibleCols
                    },
                    collapsedSections: Array.from(document.querySelectorAll('.collapsible-section.collapsed')).map(el => el.id).filter(Boolean)
                };

            function saveState() {
                try {
                    const state = {
                        trades: tradesData,
                        display: getDisplayConfig(),
                        dataVersion: DATA_VERSION
                    };
                    localStorage.setItem(LS_KEY, JSON.stringify(state));
                    queueRemoteSave(state);
                } catch (e) { console.warn('Failed to save state:', e); }
            }

            async function loadState() {
                try {
                    let localState = null;
                    try {
                        const raw = localStorage.getItem(LS_KEY);
                        if (raw) localState = JSON.parse(raw);
                    } catch (e) {
                        console.warn('Failed to parse local saved state:', e);
                    }

                    try {
                        const response = await fetch(STORAGE_API_URL, { cache: 'no-store' });
                        if (response.ok) {
                            const remoteDoc = await response.json();
                            const remoteState = remoteDoc && remoteDoc.state ? remoteDoc.state : null;
                            if (remoteState && Array.isArray(remoteState.trades)) {
                                localStorage.setItem(LS_KEY, JSON.stringify(remoteState));
                                return remoteState;
                            }
                        }
                    } catch (e) {
                        console.warn('Cloud state load failed; falling back to local state.', e);
                    }

                    // Seed remote storage from existing local state if the server has no data yet.
                    if (localState && Array.isArray(localState.trades)) {
                        queueRemoteSave(localState);
                        return localState;
                    }

                    return null;
                } catch (e) { console.warn('Failed to load state:', e); return null; }
            }

            function applyDisplayConfig(cfg) {
                if (!cfg) return;
                if (cfg.sectionOrder) sectionOrder = cfg.sectionOrder;
                if (cfg.sectionNames) sectionNames = cfg.sectionNames;
                if (cfg.dynamicPanelConfigs) dynamicPanelConfigs = cfg.dynamicPanelConfigs;
                if (cfg.summaryEntries) { summaryEntries = cfg.summaryEntries; }
                if (cfg.summaryIdCounter) { summaryIdCounter = cfg.summaryIdCounter; }
                if (cfg.dynamicIdCounter) { dynamicIdCounter = cfg.dynamicIdCounter; }
                if (cfg.sortState) { currentSortState = cfg.sortState; }
                // Main table config (new format)
                if (cfg.mainTableConfig) {
                    const mc = cfg.mainTableConfig;
                    const ss = document.getElementById('mainStatus');
                    if (ss && mc.status) ss.value = mc.status;
                    const cs = document.getElementById('mainCategory');
                    if (cs && mc.category) cs.value = mc.category;
                    if (mc.visibleColumns) {
                        const menu = document.getElementById('dynColMenu_main');
                        if (menu) {
                            menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                                cb.checked = mc.visibleColumns.includes(cb.getAttribute('data-column'));
                            });
                        }
                    }
                }
                // Backward compat: old format with statusFilter/selectedCategories
                if (!cfg.mainTableConfig) {
                    if (cfg.statusFilter) {
                        const ss = document.getElementById('mainStatus');
                        if (ss) ss.value = cfg.statusFilter;
                    }
                    if (cfg.selectedCategories && cfg.selectedCategories.length === 1) {
                        const cs = document.getElementById('mainCategory');
                        if (cs) cs.value = cfg.selectedCategories[0];
                    }
                }
                if (cfg.collapsedSections) {
                    cfg.collapsedSections.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.classList.add('collapsed');
                    });
                }
                // Backward compat: migrate old mainChartSection to dynamic chart panel
                if (cfg.sectionOrder && cfg.sectionOrder.includes('mainChartSection')) {
                    sectionOrder = sectionOrder.filter(id => id !== 'mainChartSection');
                    const chartCfg = { period: cfg.chartPeriod || '6M', filter: cfg.chartFilter || 'all' };
                    const chartId = dynamicIdCounter;
                    const chartPanelId = `dynPanel_${chartId}`;
                    if (!sectionOrder.includes(chartPanelId)) {
                        // Insert at the same position mainChartSection was
                        const oldIdx = cfg.sectionOrder.indexOf('mainChartSection');
                        sectionOrder.splice(oldIdx, 0, chartPanelId);
                    }
                    if (!sectionNames[chartPanelId]) sectionNames[chartPanelId] = cfg.sectionNames && cfg.sectionNames.mainChartSection ? cfg.sectionNames.mainChartSection : 'Historical Performance';
                    dynamicPanelConfigs[chartPanelId] = { type: 'chart', ...chartCfg };
                    dynamicIdCounter++;
                }
            }

            function restoreDynamicPanels() {
                Object.entries(dynamicPanelConfigs).forEach(([panelId, cfg]) => {
                    if (document.getElementById(panelId)) return;
                    const numId = parseInt(panelId.replace('dynPanel_', ''));
                    if (isNaN(numId)) return;
                    if (cfg.type === 'table') addDynamicTable(cfg, numId);
                    else if (cfg.type === 'chart') addDynamicChart(cfg, numId);
                });
                // Apply section names to all titles
                Object.entries(sectionNames).forEach(([id, name]) => {
                    const title = document.querySelector(`.section-title[data-section-id="${id}"]`);
                    if (title) title.textContent = name;
                });
                ensureSectionOrder();
            }

            function exportJSON() {
                const state = {
                    trades: tradesData,
                    display: getDisplayConfig()
                };
                const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `heresy-portfolio-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }

            function importJSON(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const state = JSON.parse(e.target.result);
                        if (state.trades && Array.isArray(state.trades)) {
                            tradesData.length = 0;
                            state.trades.forEach(t => tradesData.push(t));
                        }
                        if (state.display) {
                            applyDisplayConfig(state.display);
                            restoreDynamicPanels();
                        }
                        saveState();
                        generateTable();
                        // Re-render all dynamic charts
                        Object.keys(dynamicPanelConfigs).forEach(panelId => {
                            const numId = parseInt(panelId.replace('dynPanel_', ''));
                            if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'chart') renderDynamicChart(numId);
                        });
                    } catch (err) {
                        console.error('Import error:', err);
                        alert('Invalid JSON file.');
                    }
                };
                reader.readAsText(file);
            }

            // ===== Summary Section =====
            let summaryEntries = defaultSummaryEntries.map(e => ({...e}));
            let summaryIdCounter = 4;

            function calculateSummaryForFilter(status, category) {
                let trades = [...tradesData];
                if (status === 'open') trades = trades.filter(t => !isTradeClosed(t));
                else if (status === 'closed') trades = trades.filter(t => isTradeClosed(t));
                if (category !== 'all') trades = trades.filter(t => t.category === category);

                let totalBasis = 0, totalValue = 0, totalDayGain = 0, totalYesterdayValue = 0, hasDay = false;
                trades.forEach(t => {
                    const basis = getCostBasis(t);
                    const value = getCurrentValue(t);
                    const daily = getDailyGain(t);
                    totalBasis += basis;
                    totalValue += value;
                    if (daily.hasData || t.exit_date) {
                        totalDayGain += daily.absolute;
                        totalYesterdayValue += value - daily.absolute;
                        hasDay = true;
                    }
                });
                const gain = totalValue - totalBasis;
                const gainPct = totalBasis !== 0 ? (gain / totalBasis) * 100 : 0;
                const dayPct = totalYesterdayValue !== 0 ? (totalDayGain / totalYesterdayValue) * 100 : 0;
                return { gain, gainPct, dayGain: totalDayGain, dayPct, hasDay };
            }

            function summaryLabel(entry) {
                const s = entry.status === 'all' ? '' : entry.status.charAt(0).toUpperCase() + entry.status.slice(1);
                const c = entry.category === 'all' ? '' : entry.category;
                return [s, c].filter(Boolean).join(' · ') || 'All';
            }

            // True when a summary card's value is derived from one or more cells that are
            // currently being refreshed (so we should show a spinner instead of a number).
            function summaryIsRefreshing(status, category) {
                if (!refreshingKeys || refreshingKeys.size === 0) return false;
                let trades = [...tradesData];
                if (status === 'open') trades = trades.filter(t => !isTradeClosed(t));
                else if (status === 'closed') trades = trades.filter(t => isTradeClosed(t));
                if (category !== 'all') trades = trades.filter(t => t.category === category);
                return trades.some(t => !isTradeClosed(t) && refreshingKeys.has(getTradeMarketKey(t)));
            }

            function renderSummary() {
                const container = document.getElementById('summaryCards');
                if (!container) return;
                container.innerHTML = summaryEntries.map(entry => {
                    const d = calculateSummaryForFilter(entry.status, entry.category);
                    const gCls = d.gain >= 0 ? 'positive' : 'negative';
                    const dCls = d.dayGain >= 0 ? 'positive' : 'negative';
                    const displayName = entry.customName || summaryLabel(entry);
                    const isRefreshing = summaryIsRefreshing(entry.status, entry.category);
                    const sp = '<span class="cell-spinner">\u21bb</span>';
                    const gainVal = isRefreshing ? sp : `${formatCurrency(d.gain)} (${d.gainPct.toFixed(1)}%)`;
                    const dayVal = isRefreshing ? sp : (d.hasDay ? formatCurrency(d.dayGain) + ' (' + d.dayPct.toFixed(1) + '%)' : 'N/A');
                    return `<div class="summary-card" draggable="true" data-entry-id="${entry.id}">
                        <div class="card-label">
                            <span class="card-label-text" data-entry-id="${entry.id}">${displayName}</span>
                            <button class="remove-card" onclick="removeSummaryEntry(${entry.id})">×</button>
                        </div>
                        <div class="card-metric">
                            <span class="metric-label">Gain</span>
                            <span class="metric-value ${gCls}">${gainVal}</span>
                        </div>
                        <div class="card-metric">
                            <span class="metric-label">Day</span>
                            <span class="metric-value ${dCls}">${dayVal}</span>
                        </div>
                    </div>`;
                }).join('');
            }

            function removeSummaryEntry(id) {
                summaryEntries = summaryEntries.filter(e => e.id !== id);

                saveState();

            function initSummaryAdd() {

            // ===== Dynamic Table/Chart Elements =====

            function renderDynamicTable(id) {
                const panelId = `dynPanel_${id}`;
                const panel = document.getElementById(panelId);
                if (!panel) return;
                const statusSel = panel.querySelector('[data-role="status"]');
                const categorySel = panel.querySelector('[data-role="category"]');
                const statusVal = statusSel ? statusSel.value : 'open';
                const categoryVal = categorySel ? categorySel.value : 'all';
                const colCheckboxes = panel.querySelectorAll('.panel-col-menu input[type="checkbox"]');
                const visibleCols = [];
                colCheckboxes.forEach(cb => { if (cb.checked) visibleCols.push(cb.getAttribute('data-column')); });

                dynamicPanelConfigs[panelId] = { ...(dynamicPanelConfigs[panelId] || {}), type: 'table', status: statusVal, category: categoryVal, visibleColumns: visibleCols };

                let trades = [...tradesData];
                if (statusVal === 'open') trades = trades.filter(t => !isTradeClosed(t));
                else if (statusVal === 'closed') trades = trades.filter(t => isTradeClosed(t));
                if (categoryVal !== 'all') trades = trades.filter(t => t.category === categoryVal);

                let totalBasis = 0, totalValue = 0, totalDayGain = 0, totalYesterdayValue = 0, hasDay = false;
                trades.forEach(t => {
                    totalBasis += getCostBasis(t);
                    totalValue += getCurrentValue(t);
                    const dg = getDailyGain(t);
                    if (dg.hasData || t.exit_date) { totalDayGain += dg.absolute; totalYesterdayValue += getCurrentValue(t) - dg.absolute; hasDay = true; }
                });
                const totalGain = totalValue - totalBasis;
                const totalGainPct = totalBasis ? (totalGain / totalBasis) * 100 : 0;
                const totalDayPct = totalYesterdayValue ? (totalDayGain / totalYesterdayValue) * 100 : 0;

                updateInlineStats(`dynStats_${id}`, totalBasis, totalValue, totalGain, totalGainPct, totalDayGain, totalDayPct, hasDay, trades.length);

                const tableId = `dynTradeTable_${id}_${Date.now()}`;
                const hiddenSet = new Set(allColumns.filter(c => !visibleCols.includes(c)));
                const hide = col => hiddenSet.has(col) ? ' class="column-hidden" style="display:none;"' : '';

                const html = `<table class="trade-table" id="${tableId}">
                    <thead><tr>
                        ${allColumns.map(c => `<th data-col='${c}'${hide(c)}>${c}</th>`).join('')}

                            if (c === 'Basis') return `<td class='right-align' data-col='${c}'${hide(c)}>${formatCurrency(totalBasis)}</td>`;
                            if (c === 'Value') return `<td class='right-align' data-col='${c}'${hide(c)}>${formatCurrency(totalValue)}</td>`;
                            if (c === 'Gain') return `<td class='right-align ${totalGain>=0?'positive':'negative'}' data-col='${c}'${hide(c)}>${formatCurrency(totalGain)}<br>${totalGainPct.toFixed(2)}%</td>`;
                            if (c === 'Day') return `<td class='right-align ${totalDayGain>=0?'positive':'negative'}' data-col='${c}'${hide(c)}>${hasDay?formatCurrency(totalDayGain):'N/A'}<br>${hasDay?totalDayPct.toFixed(2)+'%':'N/A'}</td>`;
                            return `<td data-col='${c}'${hide(c)}></td>`;
                        }).join('')}
                        <td class="action-col"></td>
                    </tr></thead>
                    <tbody>${trades.map(trade => buildTradeRowHTML(trade, hide)).join('')}</tbody></table>`;

                document.getElementById(`dynTable_${id}`).innerHTML = html;

            function addDynamicChart(config, numId) {

                    <div class="section-content panel-content">

                setTimeout(() => renderDynamicChart(id), 200);

            const dynamicCharts = {};
            async function renderDynamicChart(id) {
                const periodEl = document.getElementById(`dynPeriod_${id}`);
                const filterEl = document.getElementById(`dynFilter_${id}`);
                if (!periodEl || !filterEl) return;
                const period = periodEl.value;
                const filter = filterEl.value;
                try {
                    const { fromDate, toDate, filteredTrades } = await fetchHistoricalData(period, filter);
                    if (filteredTrades.length === 0) return;
                    const { dateRange, portfolioValues, costBasisValues } = calculatePortfolioValues(fromDate, toDate, filteredTrades);
                    const canvas = document.getElementById(`dynCanvas_${id}`);
                    if (!canvas) return;
                    if (dynamicCharts[id]) dynamicCharts[id].destroy();
                    const labels = dateRange.map(d => typeof d === 'string' ? new Date(d) : d);
                    dynamicCharts[id] = new Chart(canvas.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                { label: 'Portfolio Value', data: portfolioValues, borderColor: '#007acc', backgroundColor: 'rgba(0,122,204,0.1)', fill: true, tension: 0.1, pointRadius: 0 },
                                { label: 'Cost Basis', data: costBasisValues, borderColor: '#999', borderDash: [5,5], fill: false, tension: 0.1, pointRadius: 0 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: { x: { type: 'time', time: { unit: 'day' } }, y: { beginAtZero: false } },
                            plugins: { legend: { position: 'top' }, title: { display: true, text: `${filter} (${period})`, font: { family: 'Courier New' } } }
                        }
                    });
                } catch (err) { console.error('Dynamic chart error:', err); }
            }

            function removeDynamicPanel(panelId, numId) {
                const panel = document.getElementById(panelId);
                if (panel) panel.remove();
                if (numId !== undefined && dynamicCharts[numId]) { dynamicCharts[numId].destroy(); delete dynamicCharts[numId]; }
                sectionOrder = sectionOrder.filter(id => id !== panelId);
                delete sectionNames[panelId];
                delete dynamicPanelConfigs[panelId];
                saveState();

            async function refreshTrade(tradeIdx) {
                const trade = tradesData[tradeIdx];
                if (!trade) { alert('Trade not found.'); return; }
                const btn = event && event.currentTarget;
                if (btn) btn.classList.add('spinning');
                const mk = getTradeMarketKey(trade);
                refreshingKeys.add(mk);
                patchRowsForKey(mk);
                try {
                    if (trade.type === 'stock') {
                        await fetchStockData(trade.ticker);
                        const md = marketData[trade.ticker];
                        if (!md || md.current_price === null) {
                            throw new Error(`No price data returned for ${trade.ticker}`);
                        }
                    } else if (trade.type === 'option') {
                        const ed = new Date(trade.expiration);
                        const yymmdd = ed.toISOString().slice(2, 10).replace(/-/g, '');
                        const optionType = trade.option_type.toUpperCase();
                        const strikeFormatted = String(Math.round(trade.strike * 1000)).padStart(8, '0');
                        const optionTicker = `O:${trade.ticker}${yymmdd}${optionType}${strikeFormatted}`;
                        await fetchOptionData(optionTicker);
                        const md = marketData[optionTicker];
                        if (!md || (md.current_price === null && md.yesterday_close === null)) {
                            throw new Error(`No price data returned for ${optionTicker}`);
                        }
                        if (md.fetch_error) {
                            throw new Error(`API error fetching ${optionTicker}`);
                        }
                    }
                    generateTable();
                    Object.keys(dynamicPanelConfigs).forEach(panelId => {
                        const numId = parseInt(panelId.replace('dynPanel_', ''));
                        if (!isNaN(numId) && dynamicPanelConfigs[panelId].type === 'table') renderDynamicTable(numId);
                    });
                } catch (err) {
                    alert(`Failed to refresh ${getTradeDisplay(trade)}:\n${err.message}`);
                } finally {
                    refreshingKeys.delete(mk);
                    patchRowsForKey(mk);
                    if (btn) btn.classList.remove('spinning');
                }
            }

            // Trade add/delete functions
            function parseTicker(input) {
                const s = input.trim().toUpperCase();
                // Option pattern: TICKER MM/DD/YYYY STRIKE P|C  (or with dashes for date)
                const m = s.match(/^([A-Z]+)\s+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\s+([\d.]+)\s+([PC])$/);
                if (m) {
                    const ticker = m[1];
                    const strike = parseFloat(m[3]);
                    const optionType = m[4];
                    // Parse date - handle MM/DD/YYYY or MM-DD-YYYY
                    const parts = m[2].split(/[\/\-]/);
                    let month = parts[0].padStart(2, '0');
                    let day = parts[1].padStart(2, '0');
                    let year = parts[2];
                    if (year.length === 2) year = '20' + year;
                    const expiration = `${year}-${month}-${day}`;
                    // Build Polygon option ticker: O:TICKER YYMMDD C/P 00060000
                    const expDate = new Date(expiration);
                    const yymmdd = expDate.toISOString().slice(2, 10).replace(/-/g, '');
                    const strikeFormatted = String(Math.round(strike * 1000)).padStart(8, '0');
                    const polygonTicker = `O:${ticker}${yymmdd}${optionType}${strikeFormatted}`;
                    return { type: 'option', ticker, expiration, strike, option_type: optionType, polygonTicker };
                }
                // Plain stock ticker
                if (/^[A-Z.]+$/.test(s)) {
                    return { type: 'stock', ticker: s, polygonTicker: s };
                }
                return null;
            }

            document.getElementById('tradeTicker').addEventListener('input', function() {
                const btn = document.getElementById('tickerLookupBtn');
                if (this.value.trim()) {
                    btn.classList.remove('btn-lookup-empty');
                } else {
                    btn.classList.add('btn-lookup-empty');
                }
            });

            async function lookupTradePrice() {
                const input = document.getElementById('tradeTicker').value;
                if (!input.trim()) return;
                const parsed = parseTicker(input);
                const display = document.getElementById('tradePriceDisplay');
                const btn = document.getElementById('tickerLookupBtn');
                if (!parsed) {
                    display.innerHTML = '<span style="color:#c62828">Cannot parse ticker. Use "AAPL" for stock or "PLNT 01/15/2027 60 P" for option.</span>';
                    display.classList.add('show');
                    return;
                }
                btn.disabled = true;
                btn.innerHTML = '&#x23F3;';
                display.innerHTML = 'Looking up...';
                display.classList.add('show');
                try {
                    if (parsed.type === 'stock') {
                        await fetchStockData(parsed.ticker);
                        const info = marketData[parsed.ticker];
                        if (info && info.current_price) {
                            display.innerHTML = `<span class="price-item"><span class="price-label">${parsed.ticker}:</span> <span class="price-value">$${info.current_price.toFixed(2)}</span></span>`;
                        } else {
                            display.innerHTML = `<span style="color:#c62828">No price data for ${parsed.ticker}</span>`;
                        }
                    } else {
                        // Fetch option (with bid/ask detail) and underlying stock via the active provider
                        const optLabel = input.trim().toUpperCase();
                        await Promise.all([
                            fetchOptionData(parsed.polygonTicker, { detail: true, underlying: parsed.ticker }),
                            fetchStockData(parsed.ticker)
                        ]);
                        const optInfo = marketData[parsed.polygonTicker];
                        const stkInfo = marketData[parsed.ticker];
                        let html = '';
                        // Underlying price
                        if (stkInfo && stkInfo.current_price) {
                            html += `<span class="price-item"><span class="price-label">${parsed.ticker}:</span> <span class="price-value">$${stkInfo.current_price.toFixed(2)}</span></span>`;
                        }
                        // Option price with bid/ask if available
                        const bid = optInfo && optInfo.bid;
                        const ask = optInfo && optInfo.ask;
                        if (bid != null && ask != null) {
                            const mid = (bid + ask) / 2;
                            html += `<span class="price-item"><span class="price-label">${optLabel}:</span> <span class="price-value">$${mid.toFixed(2)}</span> <span class="price-label">(${bid.toFixed(2)} / ${ask.toFixed(2)})</span></span>`;
                        } else if (optInfo && optInfo.current_price) {
                            html += `<span class="price-item"><span class="price-label">${optLabel}:</span> <span class="price-value">$${optInfo.current_price.toFixed(2)}</span></span>`;
                        } else {
                            html += `<span class="price-item" style="color:#c62828">Option price not found</span>`;
                        }
                        if (!html) html = `<span style="color:#c62828">No price data found</span>`;
                        display.innerHTML = html;
                    }
                } catch (e) {
                    display.innerHTML = `<span style="color:#c62828">Lookup failed: ${e.message}</span>`;
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '&#x21bb;';
                }
                // Append fetch time
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' });
                display.innerHTML += `<span style="color:#999; margin-left:8px; font-size:10px;">${timeStr}</span>`;
            }
